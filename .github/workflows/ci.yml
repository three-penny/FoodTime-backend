name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install ruff bandit
      - name: Ruff check
        run: ruff check .
      - name: Bandit security scan
        run: bandit -r app -x app/tests

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest pytest-cov pytest-mock fakeredis
      - name: Run tests
        env:
          APP_ENV: testing
          MAIL_SERVER: localhost
          MAIL_PORT: '1025'
          MAIL_USE_SSL: 'false'
          MAIL_USE_TLS: 'false'
          MAIL_USERNAME: ''
          MAIL_PASSWORD: ''
          MAIL_DEFAULT_SENDER: test@foodtime.local
        run: |
          python -m pytest tests/ --cov=app --cov-report=term-missing --cov-fail-under=0 -v
